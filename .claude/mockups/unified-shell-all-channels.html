<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Shell — Every Channel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#0C7580',action:'#d97706',info:'#0369a1'}}}}</script>
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#eef1f3;margin:0;}
  .label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;}
  .chrome-btn{font-size:12px;font-weight:500;color:#374151;padding:5px 10px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;}
  .save-btn{font-size:12px;font-weight:600;color:#fff;background:#0C7580;padding:5px 14px;border-radius:6px;border:none;cursor:pointer;}
  .pub-btn{font-size:12px;font-weight:600;color:#3a2a00;background:#d97706;padding:5px 14px;border-radius:6px;border:none;cursor:pointer;}

  /* channel picker */
  .grp{display:flex;flex-direction:column;gap:5px;}
  .grp-title{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:#94a3b8;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:16px;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer;white-space:nowrap;}
  .chip:hover{border-color:#cbd5e1;}
  .chip.sel{background:#0C7580;color:#fff;border-color:#0C7580;}

  .rail-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;width:100%;cursor:pointer;border:none;background:none;color:#9ca3af;font-size:9px;font-weight:600;}
  .rail-item.active{color:#0C7580;}
  .rail-item.active .rail-icon{background:rgba(12,117,128,.1);}
  .rail-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;}

  .insp-section{border-bottom:1px solid #eceff1;}
  .insp-head{display:flex;align-items:center;gap:6px;padding:9px 12px;font-size:12px;font-weight:600;color:#111827;}
  .insp-body{padding:0 12px 12px;}
  .field-label{font-size:11px;font-weight:500;color:#374151;margin-bottom:4px;display:block;}
  .text-input{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 9px;font-size:13px;outline:none;box-sizing:border-box;}
  .text-input:focus{border-color:#0C7580;box-shadow:0 0 0 2px rgba(12,117,128,.12);}
  .seg{display:flex;border:1px solid #d1d5db;border-radius:6px;overflow:hidden;}
  .seg button{flex:1;font-size:11px;font-weight:500;padding:5px 0;border:none;background:#fff;color:#6b7280;cursor:pointer;}
  .seg button.on{background:#0C7580;color:#fff;}
  #aspect-seg button{min-width:40px;padding:4px 7px;border-right:1px solid #e5e7eb;}
  #aspect-seg button:last-child{border-right:none;}

  .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#dfe4e8;position:relative;overflow:hidden;}
  .artifact{position:relative;border-radius:10px;overflow:hidden;box-shadow:0 6px 30px rgba(0,0,0,.18);background:#111;}

  .slide-rail{width:84px;background:#f7f8f9;border-left:1px solid #e5e7eb;padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;}
  .slide-mini{aspect-ratio:4/5;border-radius:6px;background:linear-gradient(160deg,#2d4a5e,#162635);border:2px solid transparent;cursor:pointer;position:relative;}
  .slide-mini.sel{border-color:#0C7580;}
  .slide-mini .num{position:absolute;top:3px;left:5px;font-size:9px;color:rgba(255,255,255,.8);font-weight:600;}
  .slide-add{aspect-ratio:4/5;border-radius:6px;border:1.5px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;color:#94a3b8;cursor:pointer;}

  .timeline{width:84px;background:#1a1d21;border-left:1px solid #2a2e33;padding:10px 8px;display:flex;flex-direction:column;gap:8px;}
  .tl-track{flex:1;background:#23272c;border-radius:6px;position:relative;min-height:180px;}
  .tl-handle{position:absolute;left:6px;right:6px;height:13px;background:#d97706;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#3a2a00;}
  .tl-clip{position:absolute;left:6px;right:6px;background:linear-gradient(180deg,#1e3a4a,#0f2230);border-radius:4px;}
  .tl-playhead{position:absolute;left:0;right:0;height:2px;background:#fff;}

  .variant-rail{width:118px;background:#f7f8f9;border-left:1px solid #e5e7eb;padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
  .variant{border:2px solid transparent;border-radius:6px;background:#fff;padding:5px;cursor:pointer;}
  .variant.sel{border-color:#0C7580;}
  .variant .vthumb{border-radius:4px;background:linear-gradient(160deg,#2d4a5e,#162635);margin-bottom:3px;}
  .variant .vlabel{font-size:9px;font-weight:600;color:#475569;text-align:center;}

  .ov-text{position:absolute;left:0;right:0;text-align:center;padding:0 22px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.6);text-transform:uppercase;line-height:1.18;letter-spacing:.03em;}
  .ov-sticker{display:inline-block;background:#fff;color:#111;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;margin-top:10px;}
  .play-badge{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;}

  .legend{font-size:11px;color:#475569;background:#fff7ed;border:1px dashed #fdba74;border-radius:8px;padding:8px 12px;}
  .arch-tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#0C7580;background:rgba(12,117,128,.1);padding:2px 7px;border-radius:5px;}

  /* doc/email canvas variants */
  .doc-canvas{background:#fff;border-radius:8px;box-shadow:0 6px 30px rgba(0,0,0,.12);padding:34px 40px;overflow-y:auto;}
  .doc-canvas h1{font-size:22px;font-weight:800;color:#111827;margin:0 0 14px;}
  .doc-canvas p{font-size:13px;line-height:1.7;color:#374151;margin:0 0 12px;}
  .doc-img{height:120px;border-radius:6px;background:linear-gradient(160deg,#2d4a5e,#162635);margin:0 0 14px;}
  .email-shell{background:#fff;border-radius:8px;box-shadow:0 6px 30px rgba(0,0,0,.12);overflow:hidden;}
  .email-head{background:#0C7580;height:46px;display:flex;align-items:center;padding:0 18px;color:#fff;font-weight:700;font-size:13px;}
</style>
</head>
<body>

<!-- CHANNEL PICKER -->
<div style="padding:12px 18px 8px;display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start;">
  <div class="grp"><span class="grp-title">Social feed</span><div class="chips" id="grp-social"></div></div>
  <div class="grp"><span class="grp-title">Stories</span><div class="chips" id="grp-stories"></div></div>
  <div class="grp"><span class="grp-title">Video</span><div class="chips" id="grp-video"></div></div>
  <div class="grp"><span class="grp-title">Local &amp; search</span><div class="chips" id="grp-local"></div></div>
  <div class="grp"><span class="grp-title">Web &amp; email</span><div class="chips" id="grp-web"></div></div>
  <div class="grp"><span class="grp-title">Ads</span><div class="chips" id="grp-ads"></div></div>
  <div class="grp"><span class="grp-title">Messaging</span><div class="chips" id="grp-msg"></div></div>
</div>
<div style="padding:0 18px 8px;"><p class="legend" id="legend"></p></div>

<!-- SHELL -->
<div style="margin:0 18px 18px;border:1px solid #d8dde1;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.05);">
  <div style="display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid #e5e7eb;background:#fff;">
    <button class="chrome-btn" style="padding:5px 8px;">←</button>
    <span style="font-size:14px;font-weight:700;color:#111827;">Low back pain</span>
    <span id="format-badge" style="display:inline-flex;align-items:center;gap:5px;background:rgba(3,105,161,.1);color:#0369a1;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;"></span>
    <span class="arch-tag" id="arch-tag"></span>
    <div class="seg" id="aspect-seg" style="width:auto;border-radius:6px;"></div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="chrome-btn">👁 Preview</button>
      <button class="save-btn">Save</button>
      <button class="pub-btn" id="pub-btn">Schedule ▾</button>
    </div>
  </div>
  <div style="display:flex;height:540px;">
    <div style="width:60px;background:#fafbfc;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;padding-top:6px;" id="icon-rail"></div>
    <div style="width:264px;border-right:1px solid #e5e7eb;background:#fff;overflow-y:auto;" id="inspector"></div>
    <div class="canvas-wrap" id="canvas-wrap"></div>
    <div id="surface"></div>
  </div>
</div>

<script>
const I={
  words:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>',
  media:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>',
  slide:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>',
  text:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5h16v2M9 19h6M12 5v14"/></svg>',
  grade:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18"/></svg>',
  trim:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8.5L20 18M8.5 15.5L20 6"/></svg>',
  caption:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15h4M15 15h2M7 11h10"/></svg>',
  overlay:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="14" height="14" rx="2"/><rect x="7" y="7" width="14" height="14" rx="2"/></svg>',
  link:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>',
  doc:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/></svg>',
  seo:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  email:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
  variants:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
};
const RL={words:'Words',media:'Media',slide:'Slide',photo:'Photo',text:'Text',grade:'Grade',trim:'Trim',caption:'Captions',overlay:'Overlay',link:'Link',doc:'Body',seo:'SEO',email:'Blocks',variants:'Sizes'};
const RI={words:I.words,media:I.media,slide:I.slide,photo:I.media,text:I.text,grade:I.grade,trim:I.trim,caption:I.caption,overlay:I.overlay,link:I.link,doc:I.doc,seo:I.seo,email:I.email,variants:I.variants};

// ── ARCHETYPES: the editing model. Channels map onto these. ──────────────────
const ARCH={
  carousel:  {tag:'Carousel',     surface:'slides',   rail:['words','slide','photo','text','grade'], canvas:'visual', aspect:'4:5', aspects:['1:1','4:5'],     sticker:false,video:false,insp:'text'},
  visual:    {tag:'Single visual',surface:'none',     rail:['words','media','text','grade'],         canvas:'visual', aspect:'1:1', aspects:['1:1','4:5','16:9'],sticker:false,video:false,insp:'visual'},
  story:     {tag:'Story frame',  surface:'none',     rail:['media','text','link'],                  canvas:'visual', aspect:'9:16',aspects:['9:16'],          sticker:true, video:false,insp:'story'},
  storyvid:  {tag:'Story · video',surface:'timeline', rail:['media','trim','caption','overlay','link','grade'],canvas:'visual',aspect:'9:16',aspects:['9:16'],sticker:true,video:true,insp:'storyvid'},
  vvideo:    {tag:'Vertical video',surface:'timeline',rail:['media','trim','caption','overlay','grade'],canvas:'visual',aspect:'9:16',aspects:['9:16'],         sticker:false,video:true,insp:'trim'},
  lvideo:    {tag:'Landscape video',surface:'timeline',rail:['media','trim','caption','overlay','grade'],canvas:'visual',aspect:'16:9',aspects:['16:9','1:1'],   sticker:false,video:true,insp:'trim'},
  doc:       {tag:'Long-form doc',surface:'none',     rail:['doc','media','seo'],                    canvas:'doc',    aspect:'—',  aspects:[],                  sticker:false,video:false,insp:'doc'},
  email:     {tag:'Rich email',   surface:'none',     rail:['email','text','media'],                 canvas:'email',  aspect:'—',  aspects:[],                  sticker:false,video:false,insp:'email'},
  ad:        {tag:'Ad creative',  surface:'variants', rail:['words','media','text','variants'],      canvas:'visual', aspect:'1:1',aspects:['1:1','4:5','9:16','16:9'],sticker:false,video:false,insp:'visual'},
  textad:    {tag:'Text ad',      surface:'none',     rail:['words','seo'],                          canvas:'textad', aspect:'—',  aspects:[],                  sticker:false,video:false,insp:'textad'},
};

// ── CHANNELS: every channel Bernard could offer → its archetype ──────────────
// media tier: req = won't post without media · opt = text-only valid, media allowed · none = no media slot
const CH={
  // social feed
  ig_post:{g:'social',label:'Instagram',badge:'Instagram Carousel',arch:'carousel',pub:'Schedule ▾',media:'req'},
  facebook:{g:'social',label:'Facebook',badge:'Facebook Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  linkedin:{g:'social',label:'LinkedIn',badge:'LinkedIn Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  twitter:{g:'social',label:'X / Twitter',badge:'X Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  threads:{g:'social',label:'Threads',badge:'Threads Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  bluesky:{g:'social',label:'Bluesky',badge:'Bluesky Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  mastodon:{g:'social',label:'Mastodon',badge:'Mastodon Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  pinterest:{g:'social',label:'Pinterest',badge:'Pinterest Pin',arch:'visual',pub:'Schedule ▾',media:'req'},
  reddit:{g:'social',label:'Reddit',badge:'Reddit Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  // stories
  ig_story:{g:'stories',label:'IG Story · photo',badge:'Instagram Story',arch:'story',pub:'Schedule ▾',media:'req'},
  ig_story_v:{g:'stories',label:'IG Story · video',badge:'Instagram Story',arch:'storyvid',pub:'Schedule ▾',media:'req'},
  fb_story:{g:'stories',label:'FB Story',badge:'Facebook Story',arch:'story',pub:'Schedule ▾',media:'req'},
  // video
  ig_reel:{g:'video',label:'IG Reel',badge:'Instagram Reel',arch:'vvideo',pub:'Export ▾',media:'req'},
  fb_reel:{g:'video',label:'FB Reel',badge:'Facebook Reel',arch:'vvideo',pub:'Export ▾',media:'req'},
  tiktok:{g:'video',label:'TikTok',badge:'TikTok Video',arch:'vvideo',pub:'Export ▾',media:'req'},
  yt_short:{g:'video',label:'YouTube Short',badge:'YouTube Short',arch:'vvideo',pub:'Export ▾',media:'req'},
  youtube:{g:'video',label:'YouTube',badge:'YouTube Video',arch:'lvideo',pub:'Export ▾',media:'req'},
  li_video:{g:'video',label:'LinkedIn Video',badge:'LinkedIn Video',arch:'lvideo',pub:'Export ▾',media:'req'},
  // local & search
  gbp:{g:'local',label:'Google Business',badge:'GBP Post',arch:'visual',pub:'Schedule ▾',media:'opt'},
  // web & email
  blog:{g:'web',label:'Blog post',badge:'Blog Article',arch:'doc',pub:'Publish ▾',media:'opt'},
  landing:{g:'web',label:'Landing page',badge:'Landing Page',arch:'doc',pub:'Export ▾',media:'opt'},
  newsletter:{g:'web',label:'Newsletter',badge:'Email Newsletter',arch:'email',pub:'Send ▾',media:'opt'},
  // ads
  google_ads:{g:'ads',label:'Google Ads',badge:'Google Ads · search',arch:'textad',pub:'Export ▾',media:'none'},
  meta_ads:{g:'ads',label:'Meta Ads',badge:'Meta Ads',arch:'ad',pub:'Export ▾',media:'req'},
  // messaging
  discord:{g:'msg',label:'Discord',badge:'Discord Message',arch:'visual',pub:'Send ▾',media:'opt'},
  slack:{g:'msg',label:'Slack',badge:'Slack Message',arch:'visual',pub:'Send ▾',media:'opt'},
};

function inspectorHTML(kind){
  const txt=`<label class="field-label">Content</label><textarea class="text-input" rows="2" style="resize:none;">Your back isn't the problem — the pattern is</textarea>
    <div style="height:10px"></div><label class="field-label">Size</label><input type="range" min="50" max="200" value="120" style="width:100%"><div style="height:10px"></div>
    <label class="field-label">Weight</label><div class="seg"><button>Reg</button><button class="on">Bold</button></div>`;
  if(kind==='text')return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.text} Text — “Your back isn't…”</div><div class="insp-body">${txt}</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.slide} Slide — layout & theme</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Photo 1 of 3</div></div>`;
  if(kind==='visual'){
    const mediaRow = CUR.media==='opt'
      ? `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.media} Media — <span style="font-weight:500;color:#9ca3af">optional · none yet</span></div><div class="insp-body"><button style="width:100%;border:1.5px dashed #cbd5e1;border-radius:6px;padding:8px;font-size:12px;color:#0C7580;font-weight:600;background:none;cursor:pointer">+ Add photo or video</button><p style="font-size:10px;color:#9ca3af;margin-top:5px">Text-only is a valid post on this channel.</p></div></div>`
      : `<div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Media — 1 photo</div></div>`;
    return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.words} Caption</div><div class="insp-body"><textarea class="text-input" rows="4" style="resize:none">Your back isn't the problem — the movement pattern is. Here's what we look for…</textarea><p style="font-size:10px;color:#9ca3af;margin-top:4px">${CUR.cap||'2,200 char limit · 4 hashtags'}</p></div></div>
    ${mediaRow}
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.text} On-image text</div></div>`;
  }
  if(kind==='textad')return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.words} Ad copy</div><div class="insp-body"><label class="field-label">Headlines (up to 3 × 30 char)</label><input class="text-input" value="Stop guessing about back pain" style="margin-bottom:5px"><input class="text-input" value="Find the real pattern" style="margin-bottom:5px"><input class="text-input" value="Move Better · Portland"><div style="height:10px"></div><label class="field-label">Descriptions (up to 2 × 90 char)</label><textarea class="text-input" rows="2" style="resize:none">A movement assessment that finds what's actually driving your pain. Book today.</textarea><p style="font-size:10px;color:#9ca3af;margin-top:5px">No image — search ads are text only.</p></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.seo} Final URL · keywords</div></div>`;
  if(kind==='story')return `<div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Media — <span style="color:#0C7580">pick photo/video</span></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.text} Overlay text</div><div class="insp-body"><textarea class="text-input" rows="2" style="resize:none;text-transform:uppercase;font-weight:700">YOUR BACK ISN'T THE PROBLEM — THE PATTERN IS</textarea></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.link} Link sticker</div><div class="insp-body"><input class="text-input" value="Reserve Your Seat"></div></div>`;
  if(kind==='storyvid')return `<div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Media — clip</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.trim} Trim — 0:23</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.caption} Captions</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.overlay} Overlay text</div><div class="insp-body"><textarea class="text-input" rows="2" style="resize:none;text-transform:uppercase;font-weight:700">YOUR BACK ISN'T THE PROBLEM</textarea></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.link} Link sticker</div><div class="insp-body"><input class="text-input" value="Reserve Your Seat"></div></div>`;
  if(kind==='trim')return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.trim} Trim</div><div class="insp-body"><div style="display:flex;gap:8px"><div style="flex:1"><label class="field-label">Start</label><input class="text-input" value="0:04"></div><div style="flex:1"><label class="field-label">End</label><input class="text-input" value="0:27"></div></div><p style="font-size:10px;color:#9ca3af;margin-top:6px">Drag the amber handles →</p></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.caption} Captions — karaoke on</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.overlay} Overlays</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.grade} Grade — Brand vibe</div></div>`;
  if(kind==='doc')return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.doc} Body</div><div class="insp-body"><label class="field-label">Headline</label><input class="text-input" value="Your back isn't the problem"><div style="height:8px"></div><label class="field-label">Format</label><div class="seg"><button class="on">H2</button><button>P</button><button>•</button><button>"</button></div></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Hero image</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.seo} SEO — title, slug, meta</div></div>`;
  if(kind==='email')return `<div class="insp-section"><div class="insp-head" style="color:#0C7580">${I.email} Blocks</div><div class="insp-body"><p style="font-size:11px;color:#6b7280;margin:0 0 8px">Hero · Headline · Body · CTA button · PS</p><label class="field-label">Subject line</label><input class="text-input" value="Why your back keeps hurting"></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.text} Headline</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280">${I.media} Hero image</div></div>`;
  return '';
}

function railHTML(rail,active){return rail.map(s=>`<button class="rail-item ${s===active?'active':''}"><span class="rail-icon">${RI[s]}</span>${RL[s]}</button>`).join('');}

function canvasHTML(a){
  if(a.canvas==='doc')return `<div class="doc-canvas" style="width:520px;max-height:480px"><h1>Your back isn't the problem — the pattern is</h1><div class="doc-img"></div><p>Most people treat low back pain as a structural failure. But in the clinic, what we see again and again is a movement pattern that loads the spine the same way, every rep, every day…</p><p>Here's the three-part assessment we run, and what each result tells us about where the real driver lives.</p></div>`;
  if(a.canvas==='email')return `<div class="email-shell" style="width:380px;max-height:480px"><div class="email-head">Move Better</div><div style="padding:22px"><div class="doc-img" style="height:140px;margin-bottom:16px"></div><h1 style="font-size:18px;font-weight:800;margin:0 0 10px;color:#111">Why your back keeps hurting</h1><p style="font-size:13px;line-height:1.6;color:#374151;margin:0 0 14px">It's rarely the structure. It's the pattern…</p><div style="display:inline-block;background:#d97706;color:#3a2a00;font-weight:700;font-size:13px;padding:9px 18px;border-radius:6px">Reserve your seat</div></div></div>`;
  // TEXT AD — no creative, pure copy (Google search ad preview)
  if(a.canvas==='textad')return `<div style="width:460px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,.1);padding:20px 22px">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px"><span style="font-size:11px;font-weight:800;color:#202124;border:1px solid #202124;border-radius:3px;padding:0 4px">Ad</span><span style="font-size:12px;color:#202124">movebetter.co/assessment</span></div>
    <div style="font-size:19px;color:#1a0dab;font-weight:400;line-height:1.3;margin-bottom:6px">Stop guessing about back pain | Find the real pattern | Move Better</div>
    <div style="font-size:13px;color:#4d5156;line-height:1.5">A movement assessment that finds what's actually driving your pain. Book today.</div>
    <p style="font-size:10px;color:#9ca3af;margin-top:14px;border-top:1px dashed #e5e7eb;padding-top:8px">No media slot — search ads are text only. Rail has no Media section.</p>
  </div>`;
  // VISUAL — but text-only when the channel makes media optional and none is attached
  const ar=a.aspect.replace(':','/');
  const showMedia = CUR.media!=='opt' || mediaOn;
  if(!showMedia){
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:12px">
      ${mediaToggle()}
      <div style="width:380px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.1);padding:16px 18px">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><div style="width:34px;height:34px;border-radius:50%;background:#0C7580;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">M</div><div><div style="font-size:13px;font-weight:700;color:#111">Move Better</div><div style="font-size:11px;color:#9ca3af">@movebetter · now</div></div></div>
        <div style="font-size:14px;line-height:1.55;color:#111">Your back isn't the problem — the movement pattern is. Here's what we look for in a first assessment 👇</div>
        <div style="margin-top:12px;border:1.5px dashed #d1d5db;border-radius:10px;padding:14px;text-align:center;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer">+ Add photo or video <span style="font-weight:400">(optional)</span></div>
      </div>
    </div>`;
  }
  const h=a.aspect==='9:16'?500:(a.aspect==='16:9'?300:(a.aspect==='1:1'?440:480));
  const art=`<div class="artifact" style="height:${h}px;aspect-ratio:${ar}">
    <div style="position:absolute;inset:0;background:linear-gradient(160deg,#2d4a5e 0%,#162635 70%,#0a1622 100%)"></div>
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.32)"></div>
    ${a.video?`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><div class="play-badge"><svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></div></div><div style="position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px">0:23</div>`:''}
    <div class="ov-text" style="top:${a.insp==='storyvid'?'24%':'50%'};transform:translateY(-50%);font-size:${a.aspect==='16:9'?18:23}px">YOUR BACK ISN'T THE PROBLEM — THE PATTERN IS<div>${a.sticker?'<span class="ov-sticker">Reserve Your Seat ›</span>':''}</div></div>
  </div>`;
  return CUR.media==='opt' ? `<div style="display:flex;flex-direction:column;align-items:center;gap:12px">${mediaToggle()}${art}</div>` : art;
}
function mediaToggle(){
  return `<div class="seg" style="width:auto;border-radius:7px"><button onclick="mediaOn=false;rerender()" class="${!mediaOn?'on':''}" style="padding:4px 12px">Text only</button><button onclick="mediaOn=true;rerender()" class="${mediaOn?'on':''}" style="padding:4px 12px">With media</button></div>`;
}

function surfaceHTML(kind){
  if(kind==='slides'){let m='';for(let i=1;i<=4;i++)m+=`<div class="slide-mini ${i===2?'sel':''}"><span class="num">${i}</span></div>`;return `<div class="slide-rail">${m}<div class="slide-add">+</div></div>`;}
  if(kind==='timeline')return `<div class="timeline"><div style="font-size:9px;color:#9ca3af;font-weight:700;letter-spacing:.06em">TIMELINE</div><div class="tl-track"><div class="tl-clip" style="top:38px;bottom:38px"></div><div class="tl-handle" style="top:38px">⋮⋮</div><div class="tl-handle" style="bottom:38px">⋮⋮</div><div class="tl-playhead" style="top:110px"></div></div><div style="font-size:9px;color:#6b7280;text-align:center">0:04 – 0:27</div></div>`;
  if(kind==='variants'){const v=[['1:1','Feed'],['4:5','Portrait'],['9:16','Story'],['16:9','Banner']];return `<div class="variant-rail"><div style="font-size:9px;color:#94a3b8;font-weight:700;letter-spacing:.06em;padding:2px">AD SIZES</div>${v.map((x,i)=>`<div class="variant ${i===0?'sel':''}"><div class="vthumb" style="aspect-ratio:${x[0].replace(':','/')}"></div><div class="vlabel">${x[1]} · ${x[0]}</div></div>`).join('')}</div>`;}
  return '';
}

const MEDIA_NOTE={
  req:'Media <b>required</b> — won\'t post without it.',
  opt:'Media <b>optional</b> — text-only is a valid post (toggle on the canvas). Add a photo/video anytime.',
  none:'<b>Text only</b> — no media slot at all (search ads).',
};
const LEGEND={
  carousel:'Side surface = <b>slide rail</b>. Multi-photo composition. Same archetype as FB carousel, LinkedIn multi-image, Pinterest Idea Pin.',
  visual:'<b>No side surface</b> — one frame + caption. The biggest archetype: FB, LinkedIn, X, Threads, Bluesky, Mastodon, Pinterest, Reddit, GBP, Discord, Slack.',
  story:'<b>No side surface</b>, 9:16, link sticker. Photo story frame. Shared by IG & FB Story.',
  storyvid:'Side surface = <b>timeline</b> (timed media). 9:16 + link sticker. Video story.',
  vvideo:'Side surface = <b>timeline</b>, 9:16. Vertical video. Shared by IG/FB Reel, TikTok, YouTube Short.',
  lvideo:'Side surface = <b>timeline</b>, 16:9. Landscape video. Shared by YouTube long-form & LinkedIn video.',
  doc:'<b>Document canvas</b>, no side surface. Rich-text body + hero + SEO. Shared by blog, landing page, LinkedIn article.',
  email:'<b>Email canvas</b>, no side surface. Block-based template (hero/headline/body/CTA/PS).',
  ad:'Side surface = <b>size variants</b>. One creative auto-stacked into every ad aspect. Meta ads.',
  textad:'<b>No canvas creative</b> — pure copy (headlines + descriptions). The one archetype with NO media: Google search ads.',
};

let CUR=null, mediaOn=false;
function activeRail(a){const m={text:'text',story:'text',storyvid:'overlay',trim:'trim',doc:'doc',email:'email',visual:'words',textad:'words'};const want=m[a.insp]||a.rail[0];return a.rail.includes(want)?want:a.rail[0];}
function rerender(){
  const a=ARCH[CUR.arch];
  document.getElementById('canvas-wrap').innerHTML=canvasHTML(a);
}
function selectChannel(id){
  CUR=CH[id]; mediaOn=false;
  const ch=CUR, a=ARCH[ch.arch];
  document.querySelectorAll('.chip').forEach(c=>c.className='chip'+(c.dataset.id===id?' sel':''));
  document.getElementById('legend').innerHTML=`<span class="arch-tag" style="margin-right:6px">${a.tag}</span>${LEGEND[ch.arch]} &nbsp;·&nbsp; ${MEDIA_NOTE[ch.media]}`;
  document.getElementById('format-badge').textContent=ch.badge;
  document.getElementById('arch-tag').textContent=a.tag;
  document.getElementById('pub-btn').textContent=ch.pub;
  const seg=document.getElementById('aspect-seg');
  if(a.aspects.length){seg.style.display='flex';seg.innerHTML=a.aspects.map(x=>`<button class="${x===a.aspect?'on':''}">${x}</button>`).join('');}
  else{seg.style.display='none';}
  document.getElementById('icon-rail').innerHTML=railHTML(a.rail,activeRail(a));
  document.getElementById('inspector').innerHTML=inspectorHTML(a.insp);
  document.getElementById('canvas-wrap').innerHTML=canvasHTML(a);
  document.getElementById('surface').innerHTML=surfaceHTML(a.surface);
}

// build chips
const groups={social:'grp-social',stories:'grp-stories',video:'grp-video',local:'grp-local',web:'grp-web',ads:'grp-ads',msg:'grp-msg'};
for(const [id,ch] of Object.entries(CH)){
  const el=document.getElementById(groups[ch.g]);
  const b=document.createElement('button');b.className='chip';b.dataset.id=id;b.textContent=ch.label;b.onclick=()=>selectChannel(id);
  el.appendChild(b);
}
selectChannel('ig_post');
</script>
</body>
</html>
