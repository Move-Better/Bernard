<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Editor Shell — Architecture Mockup</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: { primary: '#0C7580', action: '#d97706', info: '#0369a1' } } } }
</script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; background: #eef1f3; margin:0; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280; }
  .chrome-btn { font-size:12px; font-weight:500; color:#374151; padding:5px 10px; border:1px solid #d1d5db; border-radius:6px; background:white; cursor:pointer; }
  .chrome-btn:hover { background:#f9fafb; }
  .save-btn { font-size:12px; font-weight:600; color:white; background:#0C7580; padding:5px 14px; border-radius:6px; border:none; cursor:pointer; }
  .pub-btn { font-size:12px; font-weight:600; color:#3a2a00; background:#d97706; padding:5px 14px; border-radius:6px; border:none; cursor:pointer; }

  /* icon rail */
  .rail-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0; width:100%; cursor:pointer; border:none; background:none; color:#9ca3af; font-size:9px; font-weight:600; }
  .rail-item.active { color:#0C7580; }
  .rail-item.active .rail-icon { background:rgba(12,117,128,0.1); }
  .rail-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; }

  /* inspector */
  .insp-section { border-bottom:1px solid #eceff1; }
  .insp-head { display:flex; align-items:center; gap:6px; padding:9px 12px; font-size:12px; font-weight:600; color:#111827; cursor:pointer; }
  .insp-body { padding:0 12px 12px; }
  .field-label { font-size:11px; font-weight:500; color:#374151; margin-bottom:4px; display:block; }
  .text-input { width:100%; border:1px solid #d1d5db; border-radius:6px; padding:7px 9px; font-size:13px; outline:none; box-sizing:border-box; }
  .text-input:focus { border-color:#0C7580; box-shadow:0 0 0 2px rgba(12,117,128,0.12); }
  .swatch-row { display:flex; gap:5px; }
  .swatch { width:22px; height:22px; border-radius:5px; cursor:pointer; border:2px solid transparent; }
  .swatch.sel { border-color:#0C7580; }
  .seg { display:flex; border:1px solid #d1d5db; border-radius:6px; overflow:hidden; }
  .seg button { flex:1; font-size:11px; font-weight:500; padding:5px 0; border:none; background:white; color:#6b7280; cursor:pointer; }
  .seg button.on { background:#0C7580; color:white; }
  #aspect-seg button { min-width:42px; padding:4px 8px; border-right:1px solid #e5e7eb; }
  #aspect-seg button:last-child { border-right:none; }

  /* canvas area */
  .canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; background:#dfe4e8; position:relative; }
  .artifact { position:relative; border-radius:10px; overflow:hidden; box-shadow:0 6px 30px rgba(0,0,0,0.18); background:#111; }

  /* slide rail (carousel surface) */
  .slide-rail { width:88px; background:#f7f8f9; border-left:1px solid #e5e7eb; padding:8px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
  .slide-mini { aspect-ratio:4/5; border-radius:6px; background:linear-gradient(160deg,#2d4a5e,#162635); border:2px solid transparent; cursor:pointer; position:relative; overflow:hidden; }
  .slide-mini.sel { border-color:#0C7580; }
  .slide-mini .num { position:absolute; top:3px; left:5px; font-size:9px; color:rgba(255,255,255,0.8); font-weight:600; }
  .slide-add { aspect-ratio:4/5; border-radius:6px; border:1.5px dashed #cbd5e1; display:flex; align-items:center; justify-content:center; color:#94a3b8; cursor:pointer; }

  /* timeline (video surface) */
  .timeline { width:88px; background:#1a1d21; border-left:1px solid #2a2e33; padding:10px 8px; display:flex; flex-direction:column; gap:8px; }
  .tl-track { flex:1; background:#23272c; border-radius:6px; position:relative; overflow:hidden; min-height:200px; }
  .tl-clip { position:absolute; left:6px; right:6px; border-radius:5px; background:linear-gradient(180deg,#1e3a4a,#0f2230); }
  .tl-handle { position:absolute; left:6px; right:6px; height:14px; background:#d97706; border-radius:4px; display:flex; align-items:center; justify-content:center; }
  .tl-playhead { position:absolute; left:0; right:0; height:2px; background:#fff; box-shadow:0 0 6px rgba(255,255,255,0.6); }

  /* overlays inside artifact */
  .ov-text { position:absolute; left:0; right:0; text-align:center; padding:0 22px; font-weight:800; color:white; text-shadow:0 2px 8px rgba(0,0,0,0.6); text-transform:uppercase; line-height:1.18; letter-spacing:0.03em; }
  .ov-sticker { display:inline-block; background:white; color:#111; font-size:11px; font-weight:700; padding:4px 11px; border-radius:20px; margin-top:10px; }
  .play-badge { width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.28); display:flex; align-items:center; justify-content:center; }

  .scenario-tab { padding:7px 13px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .scenario-tab.active { background:#0C7580; color:white; }
  .scenario-tab.inactive { background:white; color:#4b5563; border-color:#e5e7eb; }
  .legend { font-size:11px; color:#475569; background:#fff7ed; border:1px dashed #fdba74; border-radius:8px; padding:9px 12px; }
</style>
</head>
<body>

<div style="padding:14px 18px;">
  <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px;">
    <span style="font-size:13px; color:#475569; font-weight:600; margin-right:4px;">Same shell, different post + media:</span>
    <button class="scenario-tab active" onclick="setScenario('carousel')">Carousel · photos</button>
    <button class="scenario-tab inactive" onclick="setScenario('story-photo')">Story · photo</button>
    <button class="scenario-tab inactive" onclick="setScenario('story-video')">Story · video</button>
    <button class="scenario-tab inactive" onclick="setScenario('reel')">Reel · video</button>
  </div>
  <p class="legend" id="legend">Carousel: side surface = <b>slide rail</b>. Rail sections: Words · Slide · Photo · Text · Grade. Aspect 4:5.</p>
</div>

<!-- ── THE SHELL ───────────────────────────────────────────────────── -->
<div style="margin:0 18px 18px; border:1px solid #d8dde1; border-radius:12px; overflow:hidden; background:white; box-shadow:0 2px 12px rgba(0,0,0,0.05);">

  <!-- TOP CHROME (persistent) -->
  <div style="display:flex; align-items:center; gap:12px; padding:9px 14px; border-bottom:1px solid #e5e7eb; background:white;">
    <button class="chrome-btn" style="padding:5px 8px;">←</button>
    <span style="font-size:14px; font-weight:700; color:#111827;">Low back pain</span>
    <!-- format / post-type switch -->
    <span id="format-badge" style="display:inline-flex; align-items:center; gap:5px; background:rgba(3,105,161,0.1); color:#0369a1; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;">Instagram Carousel</span>
    <!-- aspect -->
    <div class="seg" id="aspect-seg" style="width:auto; border-radius:6px;">
      <button class="aspect-b" data-a="1:1">1:1</button>
      <button class="aspect-b on" data-a="4:5">4:5</button>
      <button class="aspect-b" data-a="9:16">9:16</button>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px;">
      <button class="chrome-btn">👁 Preview</button>
      <button class="save-btn">Save</button>
      <button class="pub-btn" id="pub-btn">Schedule ▾</button>
    </div>
  </div>

  <!-- WORK AREA -->
  <div style="display:flex; height:560px;">

    <!-- ICON RAIL (adapts) -->
    <div style="width:62px; background:#fafbfc; border-right:1px solid #e5e7eb; display:flex; flex-direction:column; padding-top:6px;" id="icon-rail">
      <!-- filled by JS -->
    </div>

    <!-- INSPECTOR (contextual) -->
    <div style="width:268px; border-right:1px solid #e5e7eb; background:white; overflow-y:auto;" id="inspector">
      <!-- filled by JS -->
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap">
      <div class="artifact" id="artifact" style="height:480px; aspect-ratio:4/5;">
        <!-- bg -->
        <div id="art-bg" style="position:absolute; inset:0; background:linear-gradient(160deg,#2d4a5e 0%,#162635 70%,#0a1622 100%);"></div>
        <div style="position:absolute; inset:0; background:rgba(0,0,0,0.32);"></div>
        <!-- video play badge (video scenarios only) -->
        <div id="art-play" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none;">
          <div class="play-badge"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <!-- duration badge (video) -->
        <div id="art-dur" style="position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,0.55); color:white; font-size:11px; font-weight:600; padding:2px 7px; border-radius:4px; display:none;">0:23</div>
        <!-- overlay text -->
        <div class="ov-text" id="art-text" style="top:50%; transform:translateY(-50%); font-size:24px;">
          YOUR BACK ISN'T THE PROBLEM — THE PATTERN IS
          <div><span class="ov-sticker" id="art-sticker" style="display:none;">Reserve Your Seat ›</span></div>
        </div>
      </div>
    </div>

    <!-- SIDE SURFACE (disclosed: slide rail | timeline | none) -->
    <div id="surface"><!-- filled by JS --></div>

  </div>
</div>

<script>
const I = {
  words:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>',
  media:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>',
  slide:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>',
  text:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5h16v2M9 19h6M12 5v14"/></svg>',
  grade:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18"/></svg>',
  trim:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8.5L20 18M8.5 15.5L20 6"/></svg>',
  caption: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15h4M15 15h2M7 11h10"/></svg>',
  overlay: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="14" height="14" rx="2"/><rect x="7" y="7" width="14" height="14" rx="2"/></svg>',
  link:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>',
};

// Each scenario = which rail sections, which surface, aspect, video?, sticker?, active inspector section
const SCEN = {
  'carousel': {
    badge:'Instagram Carousel', aspect:'4:5', video:false, sticker:false, surface:'slides',
    rail:['words','slide','photo','text','grade'], active:'text',
    legend:'Carousel: side surface = <b>slide rail</b>. Rail: Words · Slide · Photo · Text · Grade. Aspect 4:5. Pub = Schedule.',
    inspector:'text', pub:'Schedule ▾'
  },
  'story-photo': {
    badge:'Instagram Story', aspect:'9:16', video:false, sticker:true, surface:'none',
    rail:['media','text','link'], active:'text',
    legend:'Story + photo: <b>no side surface</b> (one frame). Rail: Media · Overlay text · Link sticker. Aspect 9:16. Same chrome, fewer tools.',
    inspector:'story-text', pub:'Schedule ▾'
  },
  'story-video': {
    badge:'Instagram Story', aspect:'9:16', video:true, sticker:true, surface:'timeline',
    rail:['media','trim','caption','overlay','link','grade'], active:'overlay',
    legend:'Story + video: side surface = <b>timeline</b> (it has a time dimension). Rail gains Trim · Captions · Grade. Same chrome. Aspect 9:16.',
    inspector:'story-overlay', pub:'Schedule ▾'
  },
  'reel': {
    badge:'Instagram Reel', aspect:'9:16', video:true, sticker:false, surface:'timeline',
    rail:['media','trim','caption','overlay','grade'], active:'trim',
    legend:'Reel: side surface = <b>timeline</b>. Rail: Media · Trim · Captions · Overlays · Grade. Aspect 9:16. Pub = Export (post/library/ads).',
    inspector:'trim', pub:'Export ▾'
  },
};

const RAIL_LABEL = { words:'Words', media:'Media', slide:'Slide', photo:'Photo', text:'Text', grade:'Grade', trim:'Trim', caption:'Captions', overlay:'Overlay', link:'Link' };
const RAIL_ICON  = { words:I.words, media:I.media, slide:I.slide, photo:I.media, text:I.text, grade:I.grade, trim:I.trim, caption:I.caption, overlay:I.overlay, link:I.link };

function inspectorHTML(kind) {
  if (kind === 'text') return `
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.text} Text — “Your back isn't…”</div>
    <div class="insp-body">
      <label class="field-label">Content</label>
      <textarea class="text-input" rows="2" style="resize:none;">Your back isn't the problem — the pattern is</textarea>
      <div style="height:10px;"></div>
      <label class="field-label">Size</label>
      <input type="range" min="50" max="200" value="120" style="width:100%;">
      <div style="height:10px;"></div>
      <label class="field-label">Colour</label>
      <div class="swatch-row"><span class="swatch sel" style="background:#fff;border-color:#0C7580;"></span><span class="swatch" style="background:#0C7580;"></span><span class="swatch" style="background:#d97706;"></span><span class="swatch" style="background:#111;"></span></div>
      <div style="height:10px;"></div>
      <label class="field-label">Weight</label>
      <div class="seg"><button>Reg</button><button class="on">Bold</button></div>
    </div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.slide} Slide — layout & theme</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.media} Photo 1 of 3</div></div>`;

  if (kind === 'story-text') return `
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.media} Media — <span style="color:#0C7580;">pick photo/video</span></div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.text} Overlay text</div>
    <div class="insp-body">
      <textarea class="text-input" rows="2" style="resize:none; text-transform:uppercase; font-weight:700;">YOUR BACK ISN'T THE PROBLEM — THE PATTERN IS</textarea>
      <p style="font-size:10px; color:#9ca3af; margin-top:4px;">Short + all-caps · printed over the media</p>
    </div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.link} Link sticker</div>
    <div class="insp-body">
      <input class="text-input" value="Reserve Your Seat">
      <p style="font-size:10px; color:#9ca3af; margin-top:4px;">2–4 words · tap target on the Story</p>
    </div></div>`;

  if (kind === 'story-overlay') return `
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.media} Media — clip attached</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.trim} Trim — 0:23</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.caption} Captions</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.overlay} Overlay text</div>
    <div class="insp-body">
      <textarea class="text-input" rows="2" style="resize:none; text-transform:uppercase; font-weight:700;">YOUR BACK ISN'T THE PROBLEM — THE PATTERN IS</textarea>
      <div style="height:8px;"></div>
      <label class="field-label">Position</label>
      <div class="seg"><button class="on">Top</button><button>Mid</button><button>Bottom</button></div>
    </div></div>
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.link} Link sticker</div>
    <div class="insp-body"><input class="text-input" value="Reserve Your Seat"></div></div>`;

  if (kind === 'trim') return `
    <div class="insp-section"><div class="insp-head" style="color:#0C7580;">${I.trim} Trim</div>
    <div class="insp-body">
      <div style="display:flex; gap:8px;">
        <div style="flex:1;"><label class="field-label">Start</label><input class="text-input" value="0:04"></div>
        <div style="flex:1;"><label class="field-label">End</label><input class="text-input" value="0:27"></div>
      </div>
      <p style="font-size:10px; color:#9ca3af; margin-top:6px;">Drag the amber handles on the timeline →</p>
    </div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.caption} Captions — karaoke on</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.overlay} Overlays</div></div>
    <div class="insp-section"><div class="insp-head" style="color:#6b7280;">${I.grade} Grade — Brand vibe</div></div>`;

  return '';
}

function railHTML(sections, active) {
  return sections.map(s => `
    <button class="rail-item ${s===active?'active':''}">
      <span class="rail-icon">${RAIL_ICON[s]}</span>${RAIL_LABEL[s]}
    </button>`).join('');
}

function surfaceHTML(kind) {
  if (kind === 'slides') {
    let mini = '';
    for (let i=1;i<=4;i++) mini += `<div class="slide-mini ${i===2?'sel':''}"><span class="num">${i}</span></div>`;
    return `<div class="slide-rail">${mini}<div class="slide-add">+</div></div>`;
  }
  if (kind === 'timeline') {
    return `<div class="timeline">
      <div style="font-size:9px; color:#9ca3af; font-weight:700; letter-spacing:0.06em;">TIMELINE</div>
      <div class="tl-track">
        <div class="tl-clip" style="top:40px; bottom:40px;"></div>
        <div class="tl-handle" style="top:40px;">⋮⋮</div>
        <div class="tl-handle" style="bottom:40px;">⋮⋮</div>
        <div class="tl-playhead" style="top:120px;"></div>
      </div>
      <div style="font-size:9px; color:#6b7280; text-align:center;">0:04 – 0:27</div>
    </div>`;
  }
  return ''; // none
}

function setScenario(key) {
  const s = SCEN[key];
  // tabs
  document.querySelectorAll('.scenario-tab').forEach((t,i) => {
    const keys = ['carousel','story-photo','story-video','reel'];
    t.className = 'scenario-tab ' + (keys[i]===key ? 'active' : 'inactive');
  });
  // legend
  document.getElementById('legend').innerHTML = s.legend;
  // chrome
  document.getElementById('format-badge').textContent = s.badge;
  document.getElementById('pub-btn').textContent = s.pub;
  document.querySelectorAll('.aspect-b').forEach(b => b.className = 'aspect-b' + (b.dataset.a===s.aspect ? ' on' : ''));
  // rail
  document.getElementById('icon-rail').innerHTML = railHTML(s.rail, s.active);
  // inspector
  document.getElementById('inspector').innerHTML = inspectorHTML(s.inspector);
  // surface
  document.getElementById('surface').innerHTML = surfaceHTML(s.surface);
  // artifact aspect + video chrome + sticker
  const art = document.getElementById('artifact');
  art.style.aspectRatio = s.aspect.replace(':','/');
  document.getElementById('art-play').style.display = s.video ? 'block' : 'none';
  document.getElementById('art-dur').style.display = s.video ? 'block' : 'none';
  document.getElementById('art-sticker').style.display = s.sticker ? 'inline-block' : 'none';
  // text position: story = higher, carousel = center
  const t = document.getElementById('art-text');
  if (key==='story-video') { t.style.top='26%'; } else { t.style.top='50%'; }
  art.style.height = s.aspect==='9:16' ? '500px' : (s.aspect==='1:1' ? '440px' : '480px');
}

setScenario('carousel');
</script>
</body>
</html>
