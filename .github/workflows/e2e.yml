name: E2E smoke

on:
  pull_request:
    branches: [main]

# Cancel in-progress e2e runs on new pushes to the same PR — preview URLs
# only point at the latest commit anyway, so older runs are stale.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Wait for the Vercel Preview deployment for this commit to reach
      # `success`, then capture its environment_url. We poll GitHub's
      # Deployments API rather than hitting the URL directly because
      # Vercel Deployment Protection 401s anonymous probes — and the
      # third-party "wait" actions all probe the URL.
      - name: Wait for Vercel preview
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            statuses_url=$(gh api \
              "repos/${{ github.repository }}/deployments?sha=${HEAD_SHA}&environment=Preview" \
              --jq '.[0].statuses_url // ""')
            if [ -n "$statuses_url" ]; then
              state=$(gh api "$statuses_url" --jq '.[0].state // ""')
              env_url=$(gh api "$statuses_url" --jq '.[0].environment_url // ""')
              echo "[$i/90] state=$state url=$env_url"
              case "$state" in
                success)
                  if [ -z "$env_url" ]; then
                    echo "Deployment success but no environment_url — bailing." >&2
                    exit 1
                  fi
                  echo "url=$env_url" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                failure|error)
                  echo "Vercel deployment ended in state=$state — bailing." >&2
                  exit 1
                  ;;
              esac
            else
              echo "[$i/90] no Preview deployment yet for ${HEAD_SHA}"
            fi
            sleep 10
          done
          echo "Timed out waiting for Vercel Preview deployment for ${HEAD_SHA}." >&2
          exit 1

      - name: Seed fixture data
        env:
          MULTITENANT_DATABASE_URL: ${{ secrets.MULTITENANT_DATABASE_URL }}
          E2E_WORKSPACE_SLUG: movebetter-people
          E2E_FIXTURE_CLINICIAN_NAME: E2E Smoke Clinician
        run: npm run e2e:seed

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: ${{ steps.vercel-preview.outputs.url }}
          E2E_WORKSPACE_SLUG: movebetter-people
          E2E_FIXTURE_CLINICIAN_NAME: E2E Smoke Clinician
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
