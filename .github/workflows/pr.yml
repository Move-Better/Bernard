name: PR build

on:
  pull_request:
    branches: [main, 'audit/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      # Fail if the committed api route manifest is stale vs the generator.
      # Must run before `npm run build` (prebuild regenerates it). See
      # .claude/plan-function-consolidation.md.
      - run: npm run verify-api-manifest
      - run: npm run typecheck
      - run: npm run lint
      # Vitest unit suite (tests/lib/**). Fast (~2s) and previously not gated in
      # CI at all. Includes the practice-memory indexing regression guards that
      # pin the waitUntil/await wiring fixed after the 2026-05-30 incident
      # (summaries written but zero practice_memory_chunks).
      - run: npm test
      - run: npm run build
      # Import every API handler source file to catch ERR_INTERNAL_ASSERTION
      # and other module-load-time crashes (sharp / jimp / native-module
      # ESM-CJS mismatches) before they reach production. Runs against the
      # installed node_modules — equivalent to what Vercel deploys, since
      # Vercel copies the source files unchanged and traces dependencies.
      - run: npm run verify-bundles
      # V1 caption voice-fidelity gate. Reads a committed fixture (refreshed
      # offline via scripts/voice-fidelity-captions.mjs --fixture-out=…) and
      # fails the build if the average dips more than VOICE_FIDELITY_GATE_PCT
      # below VOICE_FIDELITY_GATE_BASELINE. Skips (exit 2) when the fixture is
      # absent, so first-run PRs aren't blocked. Tunable via env.
      - run: npm run verify-caption-fidelity
      # Schema-drift guard: fail the PR if any column the code expects (per the
      # committed supabase/expected-schema.json snapshot) is MISSING from prod —
      # i.e. a migration was written but not applied (Bernard has no migration
      # tracker). Skips cleanly if the secret is ever absent. Refresh the
      # snapshot with `npm run schema:snapshot` after applying a migration.
      - run: npm run schema:verify
        env:
          MULTITENANT_DATABASE_URL: ${{ secrets.MULTITENANT_DATABASE_URL }}

  review:
    runs-on: ubuntu-latest
    # Non-blocking: build is the required gate; review is informational.
    # To make it block merges, add "review" to branch protection required checks.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this PR for bugs, security issues, and correctness. Focus on logic errors, missing validation, race conditions, and API contract violations.

            Also explicitly check for these five recurring patterns that have caused 26+ audit rounds in this codebase:

            1. **`detail:` in error responses** — any `res.status(NNN).json({ ..., detail: ... })` leaks server internals. The field must be absent; log with console.error instead.
            2. **Missing UUID_RE validation** — any route param or body field that ends up in a PostgREST URL filter (e.g. `?id=eq.${id}`) must be validated with `/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i` before interpolation.
            3. **`enforceLimit` before auth** — `enforceLimit(req, res, bucket)` must be called AFTER `workspaceContext` + `requireRole`, never before. Rate-limiting an unauthenticated caller with a workspace bucket is incorrect and wastes quota.
            4. **String equality for HMAC** — OAuth state/signature comparisons must use `crypto.timingSafeEqual(Buffer.from(expected), Buffer.from(sig))`, not `===` or `!==`.
            5. **Bare fire-and-forget in Node handlers** — any `Promise` kicked off after `res.json()` (cache writes, indexing, enrichment) must be wrapped in `waitUntil()` from `@vercel/functions`, or it will be killed when the response sends.

            Post findings as a PR review comment. Flag any instance of these five patterns as a blocking issue.
          allowed_tools: "Bash,Read,Glob,Grep"
