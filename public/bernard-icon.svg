<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bernard">
  <title>Bernard</title>
  <!-- Emerald rounded-square app mark with a bold white "B" monogram. -->
  <!-- Kept deliberately simple so it stays legible down to 16px favicons. -->
  <rect width="64" height="64" rx="14" fill="#10B981"/>
  <text x="32" y="34"
        text-anchor="middle" dominant-baseline="central"
        font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="700" font-size="46" fill="#FFFFFF">B</text>
</svg>
